<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>testerd official site</title>
</head>

<body>

<h1>здравствуйте я testerd я люблю сахуров это мой сайт</h1>
<div id="images"></div>

<script>
async function loadImages() {

    const res = await fetch("https://duckduckgo.com/?q=tung+tung+sahur&iax=images&ia=images");
    const text = await res.text();

    const matches = [...text.matchAll(/"image":"(.*?)"/g)];

    const container = document.getElementById("images");

    for (let i = 0; i < 10 && i < matches.length; i++) {
        const img = document.createElement("img");
        img.src = matches[i][1].replace(/\\u002F/g, "/");
        img.width = 300;
        container.appendChild(img);
    }

}

loadImages();
</script>

</body>
</html>
